# ---------------------------------------------------------------------------
# Stats differences
# ---------------------------------------------------------------------------
# Numeric stats (benchmark_count, slice_count, metric_count, etc.)
# diverge because the underlying snapshots are independent runs.
# The test does not assert stat values — only that the keys are
# present.
stats:
  rationale: |
    Snapshot drift: ours and ref are built from different EEE pulls
    at different times; counts naturally differ. The test asserts
    schema (which keys are present) only.
